<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | In The Danger Zones</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #231F20;
      }
      #unity-canvas {
        width: 100% !important;
        height: 100% !important;
        background: #231F20;
      }
    </style>
  </head>
  <body style="text-align: center">
    <canvas id="unity-canvas"></canvas>

    <script src="Build/LinearDungeonDelve Demo.loader.js"></script>
    <script>
      createUnityInstance(document.querySelector("#unity-canvas"), {
        dataUrl: "Build/LinearDungeonDelve Demo.data",
        frameworkUrl: "Build/LinearDungeonDelve Demo.framework.js",
        codeUrl: "Build/LinearDungeonDelve Demo.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "In The Danger Zones",
        productVersion: "1.0",
        devicePixelRatio: 1
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
